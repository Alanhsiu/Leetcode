name: Deploy site to GitHub Pages

# Builds the Astro site and deploys it to GitHub Pages on every push to main.
# Adding a new note to any of the four content folders and pushing to main is
# enough to rebuild + redeploy automatically.
#
# NOTE: this uses the official GitHub Pages "GitHub Actions" deployment flow.
# One-time repo setting: Settings -> Pages -> Build and deployment ->
# Source = "GitHub Actions" (replaces the old gh-pages branch deploy).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress prod deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 22
        # withastro/action installs deps, runs `astro build`, and uploads the
        # built site as a Pages artifact (base/site come from astro.config.mjs).

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
